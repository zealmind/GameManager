<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GameManager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <div id="welcome-screen" class="welcome-screen active">
            <div class="welcome-video-wrapper">
                <video id="welcome-video" autoplay muted loop playsinline>
                    <source src="https://6rp3am1f7fy2hpjl.public.blob.vercel-storage.com/Welcome.mp4" type="video/mp4">
                </video>
                <div class="welcome-overlay"></div>
                <button id="enter-btn" class="enter-btn">Checking...</button>
            </div>
        </div>
        <header class="app-header">
            <h1>GameManager</h1>
            <div class="app-subtitle">Author: Raja K &bull; built with AI</div>
        </header>
        <main id="main-content">
            <!-- Views will be rendered here -->
        </main>
        <nav class="bottom-nav">
            <button class="nav-btn active" data-view="dashboard">
                <span class="nav-icon">📊</span>
                <span class="nav-label">Dashboard</span>
            </button>
            <button class="nav-btn" data-view="players">
                <span class="nav-icon">👥</span>
                <span class="nav-label">Players</span>
            </button>
        </nav>
    </div>

    <script id="config" type="application/json">
      {"apiBase": "API_BASE_PLACEHOLDER"}
    </script>
    <script>
      (function() {
        const configEl = document.getElementById('config');
        if (configEl && configEl.textContent) {
          try {
            const cfg = JSON.parse(configEl.textContent);
            if (cfg.apiBase && cfg.apiBase !== 'API_BASE_PLACEHOLDER') {
              window.__API_BASE__ = cfg.apiBase;
            }
          } catch (e) {}
        }
      })();
    </script>
    <script src="app.js"></script>
</body>
</html>
