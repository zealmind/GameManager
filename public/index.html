<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GameManager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <h1>GameManager</h1>
        </header>
        <main id="main-content">
            <!-- Views will be rendered here -->
        </main>
        <nav class="bottom-nav">
            <button class="nav-btn active" data-view="events">
                <span class="nav-icon">📅</span>
                <span class="nav-label">Events</span>
            </button>
            <button class="nav-btn" data-view="players">
                <span class="nav-icon">👥</span>
                <span class="nav-label">Players</span>
            </button>
        </nav>
    </div>

    <script src="app.js"></script>
    <script id="config" type="application/json">
      {"apiBase": "API_BASE_PLACEHOLDER"}
    </script>
    <script>
      (function() {
        const configEl = document.getElementById('config');
        if (configEl && configEl.textContent) {
          try {
            const cfg = JSON.parse(configEl.textContent);
            if (cfg.apiBase && cfg.apiBase !== 'API_BASE_PLACEHOLDER') {
              window.__API_BASE__ = cfg.apiBase;
            }
          } catch (e) {}
        }
      })();
    </script>
</body>
</html>
